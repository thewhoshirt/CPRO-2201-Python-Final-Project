<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>{% block title %}{% endblock %}</title>
    <!-- This will make it so any pages that use this global page, the title with change to reflect what page it is. -->
</head>
<body class="m-3">
    <!-- This will show up on every page -->
    <header>
        <h1>Employee Training Analytics Portal</h1>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <button class="navbar-toggler" type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#navbarNav"
                        aria-controls="#navbarNav"
                        aria-expanded="false"
                        aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'home' %}">Home</a>
                        </li>
                        <li>
                            <a class="nav-link" href="{% url 'employee_list' %}">Employees</a>
                        </li>
                    </ul>

                </div>
            </div> 

        </nav>        


    </header>
    <!-- All content here will change based on page  -->
    {% block content %}
        <!-- Home page content -->
        <div class="text-center position-absolute top-50 start-50 translate-middle d-flex flex-column">
            <h2>Welcome to the Employee Training Session Analytics Portal</h2>
            <div class="m-3">
                <a class="btn btn-primary" href="{% url 'employee_list' %}">Employees</a>
                <a class="btn btn-primary" href="{% url 'course_list' %}">Courses</a>
                <!-- session button -->
                <a class="btn btn-primary" href="{% url 'enrollment_list' %}">Enrollments</a>
                <a class="btn btn-primary" href="{% url 'analytics' %}">Analytics</a>
            </div>
        </div>
    {% endblock %}
    <!-- <br>
    <br>
    <br> -->
    <footer class="text-center fixed-bottom">
        Final Project For CPRO 2201 Python II &ensp; || &ensp; Made By Janelle Andrews & Sydney Embury
    </footer>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</html>
