{% extends "analytics_portal/global_layout.html" %}

{% block title %}Courses{% endblock %}


{% block content %}
    <h2>Update Course</h2>
    <from method = "post">
        {%csrf_token%}
        {{form.as_p}}

        <button class="btn btn-primary" type="submit">Save</button>
        <a class="btn btn-secondary" href="{% url 'course_list' %}">Cancel</a>
    </from>
{% endblock %}
