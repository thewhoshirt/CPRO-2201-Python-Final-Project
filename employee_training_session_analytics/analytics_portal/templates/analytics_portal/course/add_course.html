{% extends "analytics_portal/global_layout.html" %}

{% block title %}Courses{% endblock %}


{% block content %}

    <h2> Add Course</h2>
    <form method="post">
        <!-- cross-site request forgery token, a security feature for submitting a form with Django.  -->
        {% csrf_token %}
        <!-- renders the form with each field wrapped in a <p> tag -->
        {{form.as_p}}
        
        <button class="btn btn-primary" type="submit">Save</button>
        <a class="btn btn-secondary" href="{% url 'course_list' %}">Cancel</a>
    </form>

{% endblock %}
