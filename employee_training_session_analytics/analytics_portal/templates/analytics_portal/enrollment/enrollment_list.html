<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrollments</title>
</head>
<body>
    <h2>Enrollments</h2>
    <a href="{% url 'add_enrollment'%}">Enroll Employee</a>

    <!-- filter by status -->
    <form method="GET">
        <label for="status">Filter by status:</label>
        <select name="status">
            <option value="">All</option>
            {% for value, label in status %}
                <option value="{{ value }}">{{ label }}</option>
            {% endfor %}
        </select>
        <button type="submit">Search</button>
    </form>

    <!-- display results -->
    <table border="1">
        <tr>
            <th>Employee (email)</th>
            <th>Course</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        
        {% for enrollment in enrollments %}
            <tr>
                <td>{{enrollment.employee.email}}</td>
                <td>{{enrollment.session}}</td>
                <td>{{enrollment.get_status_display}}</td>
                <td>
                    <a href="{% url 'update_enrollment' enrollment.id %}">Edit</a>
                </td>
            </tr>
            </table>
        {% empty %}
            </table>
            <tr>No results found.</tr>
        {% endfor %}
</body>
</html>
